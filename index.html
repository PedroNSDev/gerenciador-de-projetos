<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowDesk - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="check_login.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#eef2ff; --surface:#fff; --text:#0f172a; --muted:#64748b; --border:#dbeafe;
            --acc:#4f46e5; --acc-dark:#4338ca; --danger:#ef4444; --success:#10b981;
            --r:14px; --rsm:9px; --font:'Outfit',sans-serif; --mono:'JetBrains Mono',monospace;
            --shadow:0 20px 80px rgba(15,23,42,.08);
        }
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:var(--font);min-height:100vh;background:radial-gradient(circle at top left, rgba(79,70,229,.14), transparent 28%),radial-gradient(circle at bottom right, rgba(99,102,241,.11), transparent 30%),var(--bg);color:var(--text);}
        .fsc{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
        .acard{width:100%;max-width:420px;background:var(--surface);border-radius:22px;padding:36px 34px;box-shadow:var(--shadow);border:1px solid rgba(148,163,184,.12)}
        .logo{font-size:1.85rem;font-weight:800;letter-spacing:-.04em;margin-bottom:6px}
        .logo span{color:var(--acc)}
        .logo-sub{color:var(--muted);font-size:.92rem;margin-bottom:26px;line-height:1.5}
        .atabs{display:flex;gap:6px;background:#f8fbff;border-radius:999px;padding:6px;margin-bottom:22px}
        .atab{flex:1;padding:11px 14px;border:none;border-radius:999px;background:transparent;color:var(--muted);font-size:.86rem;font-weight:700;cursor:pointer;transition:.18s}
        .atab.active{background:var(--acc);color:#fff;box-shadow:0 8px 20px rgba(79,70,229,.16)}
        .fg{margin-bottom:16px}
        .fl{display:block;font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.09em;margin-bottom:8px}
        .fi,.fta{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:16px;background:#f8fbff;color:var(--text);font-size:.95rem;outline:none;transition:.18s}
        .fi:focus,.fta:focus{border-color:var(--acc);background:#fff;box-shadow:0 0 0 4px rgba(79,70,229,.08)}
        .fta{resize:vertical;min-height:100px}
        .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 18px;border:none;border-radius:16px;font-weight:700;font-size:.95rem;cursor:pointer;transition:.18s}
        .btn-p{background:var(--acc);color:#fff}
        .btn-p:hover{background:var(--acc-dark)}
        .btn-s{background:#fff;color:var(--text);border:1.5px solid var(--border)}
        .btn-full{width:100%}
        .err{display:none;padding:12px 14px;border-radius:14px;background:rgba(254,226,226,.92);color:var(--danger);font-size:.88rem;margin-bottom:16px}
        .toast-ctr{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:10px;z-index:999}
        .toast{padding:12px 16px;border-radius:14px;color:#fff;font-size:.9rem;box-shadow:0 14px 30px rgba(15,23,42,.18);}
        .toast.success{background:var(--success)}
        .toast.error{background:var(--danger)}
        .toast.warning{background:#f59e0b}
        .fhint{font-size:.82rem;color:var(--muted);line-height:1.4}
        .hidden{display:none}
    </style>
</head>
<body>
<div class="fsc">
    <div class="acard">
        <div class="logo">Flow<span>Desk</span></div>
        <div class="logo-sub">Gestão colaborativa de projetos com login e workspaces individuais.</div>
        <div class="atabs">
            <button id="atab-entrar" class="atab active" onclick="switchAuthTab('entrar')">Entrar</button>
            <button id="atab-cadastrar" class="atab" onclick="switchAuthTab('cadastrar')">Cadastrar</button>
        </div>

        <div id="aform-entrar">
            <div id="login-err" class="err">Usuário ou senha inválidos.</div>
            <div class="fg"><label class="fl">Usuário</label><input id="inp-user" class="fi" placeholder="seu_usuario" onkeydown="if(event.key==='Enter')fazerLogin()"></div>
            <div class="fg"><label class="fl">Senha</label><input id="inp-pass" type="password" class="fi" placeholder="••••••" onkeydown="if(event.key==='Enter')fazerLogin()"></div>
            <button id="btn-login" class="btn btn-p btn-full" onclick="fazerLogin()">Entrar</button>
        </div>

        <div id="aform-cadastrar" class="hidden">
            <div id="cad-err" class="err">Erro ao cadastrar.</div>
            <div class="fg"><label class="fl">Nome completo</label><input id="inp-nome" class="fi" placeholder="Seu nome"></div>
            <div class="fg"><label class="fl">Usuário</label><input id="inp-cad-user" class="fi" placeholder="seu_usuario"></div>
            <div class="fg"><label class="fl">Senha</label><input id="inp-cad-pass" type="password" class="fi" placeholder="••••••"></div>
            <button id="btn-cadastrar" class="btn btn-p btn-full" onclick="cadastrarUsuario()">Cadastrar</button>
        </div>
    </div>
</div>
<div class="toast-ctr" id="toast-ctr"></div>
<script>
let currentUser = null;

document.addEventListener('DOMContentLoaded', async () => {
    const userId = localStorage.getItem('fd-user-id');
    if (userId) {
        window.location.href = 'homepage.html';
        return;
    }
});

function switchAuthTab(tab) {
    document.getElementById('atab-entrar').classList.toggle('active', tab==='entrar');
    document.getElementById('atab-cadastrar').classList.toggle('active', tab==='cadastrar');
    document.getElementById('aform-entrar').classList.toggle('hidden', tab!=='entrar');
    document.getElementById('aform-cadastrar').classList.toggle('hidden', tab!=='cadastrar');
    document.getElementById('login-err').style.display = 'none';
    document.getElementById('cad-err').style.display = 'none';
}

async function fazerLogin() {
    const uname = document.getElementById('inp-user').value.trim();
    const pass = document.getElementById('inp-pass').value;
    const errEl = document.getElementById('login-err');
    const btn = document.getElementById('btn-login');
    errEl.style.display = 'none';
    if (!uname || !pass) { errEl.textContent = 'Preencha usuário e senha.'; errEl.style.display='block'; return; }
    btn.disabled = true; btn.textContent = 'Entrando...';
    try {
        const { data: user } = await sb.from('usuarios').select('*').eq('username', uname).single();
        if (!user || user.senha !== pass) throw new Error('Usuário ou senha inválidos.');
        currentUser = user;
        localStorage.setItem('fd-user-id', user.id);
        window.location.href = 'homepage.html';
    } catch (e) {
        errEl.textContent = e.message; errEl.style.display = 'block';
    } finally {
        btn.disabled = false; btn.textContent = 'Entrar';
    }
}

async function cadastrarUsuario() {
    const nome = document.getElementById('inp-nome').value.trim();
    const uname = document.getElementById('inp-cad-user').value.trim();
    const pass = document.getElementById('inp-cad-pass').value;
    const errEl = document.getElementById('cad-err');
    const btn = document.getElementById('btn-cadastrar');
    errEl.style.display = 'none';
    if (!nome || !uname || !pass) { errEl.textContent = 'Preencha todos os campos.'; errEl.style.display='block'; return; }
    btn.disabled = true; btn.textContent = 'Cadastrando...';
    try {
        const { data, error } = await sb.from('usuarios').insert({ nome, username: uname, senha: pass }).select().single();
        if (error) throw error;
        currentUser = data;
        localStorage.setItem('fd-user-id', data.id);
        window.location.href = 'homepage.html';
    } catch (e) {
        errEl.textContent = e.message; errEl.style.display = 'block';
    } finally {
        btn.disabled = false; btn.textContent = 'Cadastrar';
    }
}

function toast(message, type='success') {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = message;
    document.getElementById('toast-ctr').appendChild(el);
    setTimeout(() => el.remove(), 3800);
}
</script>
</body>
</html>
